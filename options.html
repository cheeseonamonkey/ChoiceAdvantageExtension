<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>ChoiceAdvantage Enhanced</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div class="panel">
    <div class="header">
      <div>
        <h1>ChoiceAdvantage Enhanced</h1>
        <div class="subtle">Granular controls with safer defaults.</div>
      </div>
      <div class="saved" id="saved">Saved</div>
    </div>

    <div class="intro">
      Core helpers stay on. Styling, blocking, and legacy request tweaks stay off until you explicitly enable them.
    </div>

    <div class="settings" id="settings"></div>

    <div class="footer">
      <div class="note">Popup spacing is tighter on purpose. Existing saved settings still load.</div>
      <a class="repo-link" href="https://github.com/cheeseonamonkey/ChoiceAdvantageExtension" target="_blank" rel="noreferrer">GitHub</a>
    </div>
  </div>

  <script src="settings.js"></script>
  <script src="jquery.min.js"></script>
  <script src="options.js"></script>
</body>
</html>
