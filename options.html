<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>ChoiceAdvantage Enhanced</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div class="panel">
    <div class="header">
      <div>
        <h1>ChoiceAdvantage Enhanced</h1>
        <div class="subtle">DNR highlighting, Escape back, and test data.</div>
      </div>
      <div class="saved" id="saved">Saved</div>
    </div>

    <div class="intro">
      The extension underlines DNR matches, can click a visible Back link on Escape, and keeps test data explicit.
    </div>

    <div class="settings" id="settings"></div>

    <div class="footer">
      <div class="note">Test data is inserted from the right-click menu.</div>
      <a class="repo-link" href="https://github.com/cheeseonamonkey/ChoiceAdvantageExtension" target="_blank" rel="noreferrer">GitHub</a>
    </div>
  </div>

  <script src="settings.js"></script>
  <script src="jquery.min.js"></script>
  <script src="options.js"></script>
</body>
</html>
