name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Node dependencies
        run: npm ci
      - name: Build popup CSS
        run: npm run build:css
      - name: Verify generated CSS is committed
        run: git diff --exit-code -- options.css
      - name: Build release zip
        run: ./scripts/package-extension.sh choiceadvantage-enhanced.zip
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: choiceadvantage-enhanced.zip
          make_latest: true
