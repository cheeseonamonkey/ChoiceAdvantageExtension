name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build release zip
        run: zip -r choiceadvantage-enhanced.zip . -x '.git/*' '.github/*' '.serena/*' 'logs/*'
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: choiceadvantage-enhanced.zip
