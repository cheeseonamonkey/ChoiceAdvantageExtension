name: Dist

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Node dependencies
        run: npm ci
      - name: Build popup CSS
        run: npm run build:css
      - name: Verify generated CSS is committed
        run: git diff --exit-code -- options.css
      - name: Set artifact name
        run: echo "ARTIFACT=dist/choiceadvantage-enhanced-v$(node -p "require('./manifest.json').version")-chromium.zip" >> "$GITHUB_ENV"
      - name: Package extension
        run: ./scripts/package-extension.sh "$ARTIFACT"
      - uses: actions/upload-artifact@v4
        with:
          name: choiceadvantage-enhanced-dist-chromium
          path: ${{ env.ARTIFACT }}
